name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Java Backend ───────────────────────────────────────────────
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: novel_translator
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis/redis-stack-server:7.4.0-v8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Initialize database schema
        run: |
          mysql -h 127.0.0.1 -P 3307 -u root -p123456 novel_translator < src/main/resources/sql/schema.sql
        env:
          MYSQL_PWD: 123456

      - name: Compile
        run: mvn -B compile -DskipTests

      - name: Run tests with coverage
        run: mvn -B test jacoco:report -Dspring.profiles.active=test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  # ── Frontend ───────────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        working-directory: web-app
        run: npm ci

      - name: Type check
        working-directory: web-app
        run: npx tsc --noEmit

      - name: Build
        working-directory: web-app
        run: npm run build

      - name: Run tests
        working-directory: web-app
        run: npx vitest run --coverage
