services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0-oracle
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: novel_translator
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存（升级为 Redis Stack 支持向量搜索）
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MTranServer 本地翻译小模型
  mtran-server:
    image: xxnuo/mtranserver:latest
    ports:
      - "8989:8989"
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=

  # Python 翻译微服务（调用 DeepSeek 大模型）
  llm-engine:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./services/translate-engine:/app
    command: >
      bash -c "pip install -i https://mirrors.aliyun.com/pypi/simple/ --trusted-host mirrors.aliyun.com fastapi uvicorn openai &&
               python translate_server.py"
    environment:
      - OPENAI_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_BASE_URL=${DEEPSEEK_BASE_URL}
      - OPENAI_MODEL=${DEEPSEEK_MODEL}
    ports:
      - "8000:8000"

  # Ollama Embedding 服务（可选，profiles: [optional] 默认不启动）
  ollama:
    image: ollama/ollama:latest
    profiles:
      - optional
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G

  # Spring Boot 后端
  backend:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - .:/app
      - m2-cache:/root/.m2
      - ./maven-settings.xml:/root/.m2/settings.xml:ro
    command: >
      bash -c "mvn clean package -DskipTests -Dmaven.test.skip=true &&
               java -jar target/novelTranslator-0.0.1-SNAPSHOT.jar"
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=${MYSQL_DB}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - MTRAN_HOST=mtran-server
      - MTRAN_PORT=${MTRAN_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - PYTHON_TRANSLATE_URL=http://llm-engine:8000/translate
      - TRANSLATION_UPLOAD_DIR=/app/uploads
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER}
      - EMBEDDING_OPENAI_API_KEY=${EMBEDDING_OPENAI_API_KEY}
      - EMBEDDING_OPENAI_BASE_URL=${EMBEDDING_OPENAI_BASE_URL}
      - HTTP_PROXY=http://host.docker.internal:7890
      - HTTPS_PROXY=http://host.docker.internal:7890
      - http_proxy=http://host.docker.internal:7890
      - https_proxy=http://host.docker.internal:7890
      - NO_PROXY=localhost,127.0.0.1,llm-engine,mtran-server,mysql,redis
      - no_proxy=localhost,127.0.0.1,llm-engine,mtran-server,mysql,redis
      - MAVEN_OPTS=-Dhttp.proxyHost=host.docker.internal -Dhttp.proxyPort=7890 -Dhttps.proxyHost=host.docker.internal -Dhttps.proxyPort=7890
      - JAVA_TOOL_OPTIONS=-Dhttp.nonProxyHosts=localhost|127.0.0.1|llm-engine|mtran-server|mysql|redis -Djava.net.useSystemProxies=false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mtran-server:
        condition: service_started

  # Nginx 网关
  nginx:
    image: nginx:1.28-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web-app/dist:/etc/nginx/web-app/dist:ro
    ports:
      - "7341:7341"
    depends_on:
      - backend

volumes:
  mysql-data:
  m2-cache:
  redis-data:
  ollama-data:
