services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - noveltrans

  # Redis Stack（支持 HNSW 向量搜索、RediSearch、JSON）
  redis:
    image: redis/redis-stack-server:7.4.0-v8
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - noveltrans

  # Python 翻译微服务（LLM 引擎）
  llm-engine:
    build: ./services/translate-engine
    working_dir: /app
    volumes:
      - ./services/translate-engine:/app
    environment:
      - OPENAI_API_KEY=${LLM_API_KEY}
      - OPENAI_BASE_URL=${LLM_BASE_URL}
      - OPENAI_MODEL=${LLM_MODEL}
      - TRANSLATE_SERVICE_API_KEY=${TRANSLATE_SERVICE_API_KEY}
      - TRANSLATION_MOCK=${TRANSLATION_MOCK:-false}
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - noveltrans

  # Ollama Embedding 服务（本地向量模型 + GPU 加速）
  # 默认禁用，如需使用请取消注释，并在 .env 中设置 EMBEDDING_PROVIDER=ollama
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   # GPU 加速向量计算（需 NVIDIA GPU + Container Toolkit）
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]
  #   # 启动时自动拉取 bge-m3 Q8 量化向量模型（635MB，轻量版）
  #   entrypoint: >
  #     sh -c "ollama serve &
  #            sleep 5 &&
  #            ollama pull bge-m3:latest 2>/dev/null || true &&
  #            wait"
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags > /dev/null 2>&1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #   restart: unless-stopped
  #   networks:
  #     - noveltrans

  # Spring Boot 后端
  backend:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - .:/app
      - m2-cache:/root/.m2
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=${MYSQL_DB}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - MTRAN_HOST=mtran-server
      - MTRAN_PORT=${MTRAN_PORT}
      - MTRAN_API_KEY=${MTRAN_API_KEY}
      - MTRAN_MOCK=${MTRAN_MOCK:-false}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - PYTHON_TRANSLATE_URL=http://llm-engine:8000/translate
      - TRANSLATE_SERVICE_API_KEY=${TRANSLATE_SERVICE_API_KEY}
      - TRANSLATION_UPLOAD_DIR=/app/uploads
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_OPENAI_API_KEY=${EMBEDDING_OPENAI_API_KEY}
      - EMBEDDING_OPENAI_BASE_URL=${EMBEDDING_OPENAI_BASE_URL}
      - EMBEDDING_OPENAI_MODEL=${EMBEDDING_OPENAI_MODEL:-text-embedding-3-small}
      - EMBEDDING_OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDING_OLLAMA_MODEL=bge-m3
      # Stripe 支付
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL}
      - STRIPE_PRO_MONTHLY_PRICE_ID=${STRIPE_PRO_MONTHLY_PRICE_ID}
      - STRIPE_PRO_YEARLY_PRICE_ID=${STRIPE_PRO_YEARLY_PRICE_ID}
      - STRIPE_MAX_MONTHLY_PRICE_ID=${STRIPE_MAX_MONTHLY_PRICE_ID}
      - STRIPE_MAX_YEARLY_PRICE_ID=${STRIPE_MAX_YEARLY_PRICE_ID}
      # 翻译服务线程池
      - TRANSLATE_MAX_WORKERS=${TRANSLATE_MAX_WORKERS:-2}
      # 代理（可选，如需要设置 HTTP_PROXY 环境变量）
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,llm-engine,mtran-server,mysql,redis,ollama,api.stripe.com,checkout.stripe.com}
      - no_proxy=${NO_PROXY:-localhost,127.0.0.1,llm-engine,mtran-server,mysql,redis,ollama,api.stripe.com,checkout.stripe.com}
      - MAVEN_OPTS=${MAVEN_OPTS:-}
      - JAVA_TOOL_OPTIONS=${JAVA_TOOL_OPTIONS:-}
    command: >
      bash -c "mvn clean package -DskipTests -Dmaven.test.skip=true -s maven-settings.xml &&
               java -jar target/novelTranslator-0.0.1-SNAPSHOT.jar"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      # 如需本地 Embedding，取消注释 ollama 服务及下行：
      # ollama:
      #   condition: service_started
    restart: unless-stopped
    networks:
      - noveltrans

  # Nginx 网关
  nginx:
    image: nginx:1.28-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web-app/dist:/etc/nginx/web-app/dist:ro
    ports:
      - "7341:7341"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - noveltrans

volumes:
  mysql-data:
  m2-cache:
  redis-data:
  ollama-data:

networks:
  noveltrans:
    driver: bridge
