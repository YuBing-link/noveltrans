<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用极简翻译</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 520px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px 30px 24px;
            text-align: center;
        }

        .logo { font-size: 48px; margin-bottom: 12px; }
        .title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .version { font-size: 13px; opacity: 0.8; }

        .content { padding: 28px 28px 20px; }

        /* 步骤引导 */
        .steps { margin-bottom: 24px; }
        .step {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            position: relative;
        }
        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 17px;
            top: 52px;
            bottom: -6px;
            width: 2px;
            background: #e5e7eb;
        }

        .step-num {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .step-body { flex: 1; padding-top: 4px; }
        .step-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .step-desc {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.6;
        }

        /* 提示卡片 */
        .notice {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 24px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .notice-icon {
            width: 24px;
            height: 24px;
            background: #f97316;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .notice-text { font-size: 13px; color: #9a3412; line-height: 1.6; }
        .notice-text strong { color: #c2410c; }

        /* 功能预览 */
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }
        .feat {
            background: #f9fafb;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }
        .feat-icon { font-size: 24px; margin-bottom: 6px; }
        .feat-name { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 2px; }
        .feat-desc { font-size: 11px; color: #9ca3af; }

        .actions { display: flex; gap: 10px; }

        .btn {
            flex: 1;
            padding: 13px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        .btn-secondary:hover { background: #e5e7eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🌐</div>
            <div class="title">极简翻译</div>
            <div class="version">Extreme Translator v1.0.0</div>
        </div>

        <div class="content">
            <!-- 步骤引导 -->
            <div class="steps">
                <div class="step">
                    <div class="step-num">1</div>
                    <div class="step-body">
                        <div class="step-title">访问网站</div>
                        <div class="step-desc">点击下方"前往登录"按钮，或在浏览器工具栏点击插件图标打开设置</div>
                    </div>
                </div>
                <div class="step">
                    <div class="step-num">2</div>
                    <div class="step-body">
                        <div class="step-title">注册账号</div>
                        <div class="step-desc">使用邮箱注册，接收验证码后完成注册</div>
                    </div>
                </div>
                <div class="step">
                    <div class="step-num">3</div>
                    <div class="step-body">
                        <div class="step-title">开始翻译</div>
                        <div class="step-desc">登录后即可使用网页翻译、阅读模式和专家模式</div>
                    </div>
                </div>
            </div>

            <!-- 提示卡片 -->
            <div class="notice">
                <div class="notice-icon">!</div>
                <div class="notice-text">
                    <strong>专家模式需要登录</strong><br>
                    专家模式使用大语言模型进行翻译，翻译质量更高但速度较慢。为保障服务质量，该功能仅对已登录用户开放。免费用户也可享受基础翻译功能。
                </div>
            </div>

            <!-- 功能预览 -->
            <div class="features">
                <div class="feat">
                    <div class="feat-icon">📄</div>
                    <div class="feat-name">网页翻译</div>
                    <div class="feat-desc">一键翻译整个页面</div>
                </div>
                <div class="feat">
                    <div class="feat-icon">📖</div>
                    <div class="feat-name">阅读模式</div>
                    <div class="feat-desc">沉浸式阅读体验</div>
                </div>
                <div class="feat">
                    <div class="feat-icon">✨</div>
                    <div class="feat-name">选中翻译</div>
                    <div class="feat-desc">划词即时翻译</div>
                </div>
                <div class="feat">
                    <div class="feat-icon">🧠</div>
                    <div class="feat-name">专家模式</div>
                    <div class="feat-desc">登录后解锁</div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="btn-login">前往登录</button>
                <button class="btn btn-secondary" id="btn-close">关闭</button>
            </div>
        </div>
    </div>

    <script src="welcome.js"></script>
</body>
</html>
