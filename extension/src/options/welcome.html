<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用极简翻译</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .version {
            font-size: 14px;
            opacity: 0.8;
        }

        .content {
            padding: 40px 30px;
        }

        .features {
            margin-bottom: 30px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .feature-item:last-child {
            border-bottom: none;
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .feature-text {
            flex: 1;
        }

        .feature-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .feature-desc {
            font-size: 14px;
            color: #666;
        }

        .quick-start {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .quick-start h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 12px;
        }

        .step {
            display: flex;
            align-items: center;
            padding: 8px 0;
            color: #555;
            font-size: 14px;
        }

        .step-number {
            width: 24px;
            height: 24px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🌐</div>
            <div class="title">极简翻译</div>
            <div class="version">Extreme Translator v1.0.0</div>
        </div>

        <div class="content">
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">📄</div>
                    <div class="feature-text">
                        <div class="feature-title">整个网页翻译</div>
                        <div class="feature-desc">一键翻译整个网页内容，保留原有排版</div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📖</div>
                    <div class="feature-text">
                        <div class="feature-title">阅读模式</div>
                        <div class="feature-desc">提取文章正文，提供沉浸式阅读体验</div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">✨</div>
                    <div class="feature-text">
                        <div class="feature-title">选中翻译</div>
                        <div class="feature-desc">选中任意文本即可即时翻译</div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📚</div>
                    <div class="feature-text">
                        <div class="feature-title">文档翻译</div>
                        <div class="feature-desc">支持 PDF、Word、EPUB 文件翻译</div>
                    </div>
                </div>
            </div>

            <div class="quick-start">
                <h3>快速开始</h3>
                <div class="step">
                    <div class="step-number">1</div>
                    <span>点击浏览器工具栏中的扩展图标</span>
                </div>
                <div class="step">
                    <div class="step-number">2</div>
                    <span>选择目标翻译语言</span>
                </div>
                <div class="step">
                    <div class="step-number">3</div>
                    <span>点击翻译按钮开始翻译</span>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="btn-settings">前往设置</button>
                <button class="btn btn-secondary" id="btn-close">关闭</button>
            </div>
        </div>
    </div>

    <script src="../lib/browser-polyfill.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('btn-settings').addEventListener('click', function() {
                if (typeof browser !== 'undefined') {
                    browser.runtime.openOptionsPage();
                } else {
                    chrome.tabs.create({ url: chrome.runtime.getURL('src/options/options.html') });
                }
                window.close();
            });

            document.getElementById('btn-close').addEventListener('click', function() {
                window.close();
            });
        });
    </script>
</body>
</html>
