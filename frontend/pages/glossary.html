<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>术语库 - NovelTrans</title>
    <link rel="stylesheet" href="styles/animations.css">
    <script>
        // 页面加载前立即应用主题，防止闪烁
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <style>
        :root {
            --primary-color: #7c3aed;
            --primary-hover: #6d28d9;
            --primary-light: #8b5cf6;
            --primary-bg: #f5f3ff;
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border-light: #e5e7eb;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-pill: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 5%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .logo:hover { transform: scale(1.05); }

        .nav-menu { display: flex; gap: 24px; align-items: center; }
        .nav-menu a {
            color: var(--text-sub);
            font-weight: 500;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav-menu a:hover, .nav-menu a.active { color: var(--primary-color); }

        .container {
            flex: 1;
            padding: 24px 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title svg { width: 32px; height: 32px; color: var(--primary-color); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--radius-pill);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            box-shadow: 0 4px 14px rgba(124,58,237,0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124,58,237,0.45);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border-light);
            color: var(--text-main);
        }

        .btn-outline:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* 术语库列表 */
        .glossary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .glossary-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            transition: all 0.3s;
            cursor: pointer;
        }

        .glossary-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.1);
        }

        .glossary-card.active {
            border: 2px solid var(--primary-color);
        }

        .glossary-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .glossary-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-bg), #ede9fe);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glossary-icon svg { width: 24px; height: 24px; color: var(--primary-color); }

        .glossary-menu {
            position: relative;
        }

        .glossary-menu-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glossary-menu-btn svg { width: 18px; height: 18px; color: var(--text-sub); }

        .glossary-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .glossary-desc {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .glossary-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }

        .glossary-count {
            font-size: 13px;
            color: var(--text-sub);
        }

        .glossary-count span {
            font-weight: 600;
            color: var(--primary-color);
        }

        .glossary-lang {
            font-size: 12px;
            padding: 4px 10px;
            background: var(--primary-bg);
            color: var(--primary-color);
            border-radius: var(--radius-pill);
            font-weight: 600;
        }

        /* 术语列表 */
        .terms-section {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
        }

        .terms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .terms-title {
            font-size: 18px;
            font-weight: 700;
        }

        .terms-actions {
            display: flex;
            gap: 12px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 10px 16px 10px 40px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 14px;
            width: 250px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
            width: 18px;
            height: 18px;
        }

        .terms-table {
            width: 100%;
            border-collapse: collapse;
        }

        .terms-table th {
            text-align: left;
            padding: 12px 16px;
            background: var(--bg-color);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
            border-radius: var(--radius-sm);
        }

        .terms-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
            font-size: 14px;
        }

        .terms-table tr:hover {
            background: var(--primary-bg);
        }

        .term-source {
            font-weight: 600;
            color: var(--text-main);
        }

        .term-target {
            color: var(--text-sub);
        }

        .term-lang {
            font-size: 12px;
            padding: 3px 8px;
            background: var(--bg-color);
            border-radius: var(--radius-sm);
            color: var(--text-sub);
        }

        .term-actions {
            display: flex;
            gap: 8px;
        }

        .term-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: var(--bg-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .term-btn:hover {
            background: var(--primary-color);
        }

        .term-btn:hover svg { color: white; }

        .term-btn svg {
            width: 14px;
            height: 14px;
            color: var(--text-sub);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--primary-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon svg { width: 40px; height: 40px; color: var(--primary-color); }

        .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .empty-desc { color: var(--text-sub); margin-bottom: 24px; }

        @media (max-width: 1024px) {
            .glossary-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .glossary-grid { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; gap: 16px; }
        }

        /* 深色模式 */
        html[data-theme="dark"] .navbar {
            background: rgba(18, 18, 18, 0.95);
            border-bottom-color: #262626;
        }

        html[data-theme="dark"] body {
            background-color: #0a0a0a;
            color: #e5e5e5;
        }

        html[data-theme="dark"] .card {
            background: #121212;
            border-color: #262626;
        }

        html[data-theme="dark"] .glossary-item {
            border-color: #262626;
        }

        html[data-theme="dark"] .glossary-term {
            color: #a78bfa;
        }

        html[data-theme="dark"] .glossary-translation,
        html[data-theme="dark"] .glossary-desc {
            color: #a3a3a3;
        }

        html[data-theme="dark"] .empty-icon {
            background: rgba(124, 58, 237, 0.2);
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span>NovelTrans</span>
        </a>
        <div class="nav-menu">
            <a href="index.html">首页</a>
            <a href="translation.html">翻译</a>
            <a href="user.html">用户中心</a>
            <a href="glossary.html" class="active">术语库</a>
            <a href="help.html">帮助</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                术语库管理
            </h1>
            <button class="btn btn-primary" onclick="openCreateModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                创建术语库
            </button>
        </div>

        <!-- 术语库列表 -->
        <div class="glossary-grid" id="glossaryList">
            <!-- 动态加载术语库卡片 -->
        </div>

        <!-- 术语列表 -->
        <div class="terms-section" id="termsSection" style="display: none;">
            <div class="terms-header">
                <h2 class="terms-title" id="termsTitle">术语列表</h2>
                <div class="terms-actions">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="搜索术语..." id="termSearch">
                    </div>
                    <button class="btn btn-primary" onclick="addTerm()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        添加术语
                    </button>
                </div>
            </div>

            <table class="terms-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th style="width: 200px;">原文</th>
                        <th style="width: 200px;">译文</th>
                        <th>语言对</th>
                        <th style="width: 100px;">操作</th>
                    </tr>
                </thead>
                <tbody id="termsList">
                    <!-- 动态加载术语 -->
                </tbody>
            </table>
        </div>

        <!-- 空状态提示 -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <div class="empty-title">暂无术语库</div>
            <div class="empty-desc">创建您的第一个术语库，开始管理专业术语</div>
            <button class="btn btn-primary" onclick="openCreateModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                创建术语库
            </button>
        </div>
    </div>

    <!-- 创建术语库模态框 -->
    <div id="createGlossaryModal" style="display: none;">
        <div style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10002;
        " onclick="closeCreateGlossaryModal(event)">
            <div style="
                background: var(--card-bg);
                border-radius: var(--radius-lg);
                padding: 24px;
                min-width: 400px;
                max-width: 500px;
                box-shadow: var(--shadow-lg);
            ">
                <h3 style="margin: 0 0 8px 0; font-size: 18px; font-weight: 600; color: var(--text-main);">创建术语库</h3>
                <p style="margin: 0 0 20px 0; font-size: 14px; color: var(--text-sub);">请输入术语库的基本信息</p>

                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: var(--text-main);">术语库名称 <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="newGlossaryName" placeholder="请输入术语库名称" style="width: 100%; padding: 10px 12px; border: 2px solid var(--border-light); border-radius: 8px; font-size: 14px; color: var(--text-main); background: var(--card-bg);">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: var(--text-main);">描述（可选）</label>
                    <textarea id="newGlossaryDesc" placeholder="请输入术语库描述" style="width: 100%; padding: 10px 12px; border: 2px solid var(--border-light); border-radius: 8px; font-size: 14px; color: var(--text-main); background: var(--card-bg); resize: vertical; min-height: 80px;"></textarea>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px;">
                    <button onclick="closeCreateGlossaryModal()" style="padding: 10px 24px; border: 1px solid var(--border-light); border-radius: 8px; background: transparent; color: var(--text-sub); cursor: pointer; font-weight: 500;">取消</button>
                    <button onclick="submitCreateGlossary()" style="padding: 10px 24px; border: none; border-radius: 8px; background: var(--gradient-primary); color: white; cursor: pointer; font-weight: 500; box-shadow: 0 4px 14px rgba(124,58,237,0.3);">创建</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑术语模态框 -->
    <div id="termModal" style="display: none;">
        <div style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10002;
        " onclick="closeTermModal(event)">
            <div style="
                background: var(--card-bg);
                border-radius: var(--radius-lg);
                padding: 24px;
                min-width: 400px;
                max-width: 500px;
                box-shadow: var(--shadow-lg);
            ">
                <h3 style="margin: 0 0 8px 0; font-size: 18px; font-weight: 600; color: var(--text-main);" id="termModalTitle">添加术语</h3>
                <p style="margin: 0 0 20px 0; font-size: 14px; color: var(--text-sub);">请输入术语的原文和译文</p>

                <input type="hidden" id="editTermId">

                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: var(--text-main);">原文 <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="termSourceText" placeholder="请输入原文" style="width: 100%; padding: 10px 12px; border: 2px solid var(--border-light); border-radius: 8px; font-size: 14px; color: var(--text-main); background: var(--card-bg);">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: var(--text-main);">译文 <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="termTargetText" placeholder="请输入译文" style="width: 100%; padding: 10px 12px; border: 2px solid var(--border-light); border-radius: 8px; font-size: 14px; color: var(--text-main); background: var(--card-bg);">
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px;">
                    <button onclick="closeTermModal()" style="padding: 10px 24px; border: 1px solid var(--border-light); border-radius: 8px; background: transparent; color: var(--text-sub); cursor: pointer; font-weight: 500;">取消</button>
                    <button onclick="submitTerm()" style="padding: 10px 24px; border: none; border-radius: 8px; background: var(--gradient-primary); color: white; cursor: pointer; font-weight: 500; box-shadow: 0 4px 14px rgba(124,58,237,0.3);">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 当前选中的术语库 ID
        let currentGlossaryId = null;
        let currentTerms = [];
        let isEditMode = false;

        // 页面加载时获取术语库列表
        document.addEventListener('DOMContentLoaded', function() {
            loadGlossaries();
        });

        // 打开创建术语库模态框
        function openCreateModal() {
            document.getElementById('createGlossaryModal').style.display = 'block';
            document.getElementById('newGlossaryName').value = '';
            document.getElementById('newGlossaryDesc').value = '';
            document.getElementById('newGlossaryName').focus();
        }

        // 关闭创建术语库模态框
        function closeCreateGlossaryModal(e) {
            if (!e || e.target === e.currentTarget) {
                document.getElementById('createGlossaryModal').style.display = 'none';
            }
        }

        // 提交创建术语库
        async function submitCreateGlossary() {
            const name = document.getElementById('newGlossaryName').value.trim();
            const description = document.getElementById('newGlossaryDesc').value.trim();

            if (!name) {
                showNotification('请输入术语库名称', 'error');
                return;
            }

            const result = await apiClient.createGlossary({
                name: name,
                description: description,
                sourceLang: 'ja',
                targetLang: 'zh'
            });

            if (result.success) {
                showNotification('术语库创建成功', 'success');
                closeCreateGlossaryModal();
                loadGlossaries();
            } else {
                showNotification('创建失败：' + result.error, 'error');
            }
        }

        // 加载术语库列表
        async function loadGlossaries() {
            const result = await apiClient.getGlossaries();
            const container = document.getElementById('glossaryList');
            const emptyState = document.getElementById('emptyState');

            if (!result.success || !result.data || result.data.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            emptyState.style.display = 'none';

            container.innerHTML = result.data.map((glossary, index) => `
                <div class="glossary-card ${index === 0 ? 'active' : ''}" onclick="selectGlossary(${glossary.id}, this)">
                    <div class="glossary-header">
                        <div class="glossary-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        </div>
                        <div class="glossary-menu">
                            <button class="glossary-menu-btn" onclick="event.stopPropagation(); openGlossaryMenu(${glossary.id})">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="glossary-name">${escapeHtml(glossary.name)}</div>
                    <div class="glossary-desc">${escapeHtml(glossary.description || '暂无描述')}</div>
                    <div class="glossary-meta">
                        <div class="glossary-count"><span>${glossary.termCount || 0}</span> 个术语</div>
                        <div class="glossary-lang">${glossary.sourceLang || 'auto'}→${glossary.targetLang || 'zh'}</div>
                    </div>
                </div>
            `).join('');

            // 默认选中第一个术语库
            if (result.data.length > 0) {
                selectGlossary(result.data[0].id, container.querySelector('.glossary-card'));
            }
        }

        // 选择术语库
        async function selectGlossary(id, cardElement) {
            // 更新选中状态
            document.querySelectorAll('.glossary-card').forEach(card => card.classList.remove('active'));
            if (cardElement) {
                cardElement.classList.add('active');
            }

            currentGlossaryId = id;

            // 加载术语列表
            await loadTerms(id);
        }

        // 加载术语列表
        async function loadTerms(glossaryId) {
            const result = await apiClient.getTerms(glossaryId);
            const termsSection = document.getElementById('termsSection');
            const termsTitle = document.getElementById('termsTitle');
            const tbody = document.getElementById('termsList');

            if (!result.success || !result.data || result.data.length === 0) {
                termsSection.style.display = 'block';
                termsTitle.textContent = '术语列表';
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--text-sub);">暂无术语，点击右上角添加术语</td></tr>';
                return;
            }

            currentTerms = result.data;
            termsSection.style.display = 'block';

            // 获取第一个术语库名称作为标题
            const glossaryResult = await apiClient.getGlossary(glossaryId);
            if (glossaryResult.success) {
                termsTitle.textContent = `📚 ${glossaryResult.data.name} - 术语列表`;
            }

            tbody.innerHTML = result.data.map((term, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td class="term-source">${escapeHtml(term.sourceText)}</td>
                    <td class="term-target">${escapeHtml(term.targetText)}</td>
                    <td><span class="term-lang">${term.sourceLang || 'auto'}→${term.targetLang || 'zh'}</span></td>
                    <td>
                        <div class="term-actions">
                            <button class="term-btn" title="编辑" onclick="editTerm(${term.id})">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button class="term-btn" title="删除" onclick="deleteTerm(${term.id})">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 打开术语库菜单
        function openGlossaryMenu(id) {
            // 简单实现，可扩展为下拉菜单
            if (typeof UITools !== 'undefined') {
                UITools.confirmDialog('确认删除', '确定要删除此术语库吗？此操作不可恢复！').then((confirmed) => {
                    if (confirmed) {
                        apiClient.deleteGlossary(id).then(result => {
                            if (result.success) {
                                showNotification('术语库已删除', 'success');
                                loadGlossaries();
                            } else {
                                showNotification('删除失败：' + result.error, 'error');
                            }
                        });
                    }
                });
            } else {
                if (confirm('确定要删除此术语库吗？此操作不可恢复！')) {
                    apiClient.deleteGlossary(id).then(result => {
                        if (result.success) {
                            showNotification('术语库已删除', 'success');
                            loadGlossaries();
                        } else {
                            showNotification('删除失败：' + result.error, 'error');
                        }
                    });
                }
            }
        }

        // 添加术语
        function addTerm() {
            if (!currentGlossaryId) {
                showNotification('请先选择术语库', 'info');
                return;
            }

            isEditMode = false;
            document.getElementById('termModalTitle').textContent = '添加术语';
            document.getElementById('termSourceText').value = '';
            document.getElementById('termTargetText').value = '';
            document.getElementById('editTermId').value = '';
            document.getElementById('termModal').style.display = 'block';
            document.getElementById('termSourceText').focus();
        }

        // 编辑术语
        function editTerm(termId) {
            const term = currentTerms.find(t => t.id === termId);
            if (!term) return;

            isEditMode = true;
            document.getElementById('termModalTitle').textContent = '编辑术语';
            document.getElementById('termSourceText').value = term.sourceText;
            document.getElementById('termTargetText').value = term.targetText;
            document.getElementById('editTermId').value = termId;
            document.getElementById('termModal').style.display = 'block';
            document.getElementById('termSourceText').focus();
        }

        // 关闭术语模态框
        function closeTermModal(e) {
            if (!e || e.target === e.currentTarget) {
                document.getElementById('termModal').style.display = 'none';
            }
        }

        // 提交术语（添加或编辑）
        async function submitTerm() {
            const sourceText = document.getElementById('termSourceText').value.trim();
            const targetText = document.getElementById('termTargetText').value.trim();
            const termId = document.getElementById('editTermId').value;

            if (!sourceText || !targetText) {
                showNotification('请输入原文和译文', 'error');
                return;
            }

            let result;
            if (isEditMode) {
                result = await apiClient.updateTerm(currentGlossaryId, termId, {
                    sourceText: sourceText,
                    targetText: targetText,
                    description: term.description || ''
                });

                if (result.success) {
                    showNotification('术语已更新', 'success');
                    closeTermModal();
                    loadTerms(currentGlossaryId);
                } else {
                    showNotification('更新失败：' + result.error, 'error');
                }
            } else {
                result = await apiClient.addTerm(currentGlossaryId, {
                    sourceText: sourceText,
                    targetText: targetText,
                    description: ''
                });

                if (result.success) {
                    showNotification('术语添加成功', 'success');
                    closeTermModal();
                    loadTerms(currentGlossaryId);
                } else {
                    showNotification('添加失败：' + result.error, 'error');
                }
            }
        }

        // 删除术语
        function deleteTerm(termId) {
            if (typeof UITools !== 'undefined') {
                UITools.confirmDialog('确认删除', '确定要删除此术语吗？').then((confirmed) => {
                    if (confirmed) {
                        apiClient.deleteTerm(currentGlossaryId, termId).then(result => {
                            if (result.success) {
                                showNotification('术语已删除', 'success');
                                loadTerms(currentGlossaryId);
                            } else {
                                showNotification('删除失败：' + result.error, 'error');
                            }
                        });
                    }
                });
            } else {
                if (confirm('确定要删除此术语吗？')) {
                    apiClient.deleteTerm(currentGlossaryId, termId).then(result => {
                        if (result.success) {
                            showNotification('术语已删除', 'success');
                            loadTerms(currentGlossaryId);
                        } else {
                            showNotification('删除失败：' + result.error, 'error');
                        }
                    });
                }
            }
        }

        // 搜索术语
        document.getElementById('termSearch')?.addEventListener('input', function(e) {
            const value = e.target.value.toLowerCase();
            document.querySelectorAll('#termsList tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(value) ? '' : 'none';
            });
        });

        // HTML 转义防止 XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示通知
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 80px;
                right: 24px;
                padding: 14px 24px;
                background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#7c3aed'};
                color: white;
                border-radius: 12px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.15);
                font-size: 14px;
                font-weight: 600;
                z-index: 10000;
                animation: slideIn 0.3s ease;
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2500);
        }
    </script>
    <script src="config.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/auth-manager.js"></script>
    <script src="utils/ui.js"></script>
    <script src="js/auth-middleware.js"></script>
    <script src="js/auth-utils.js"></script>
    <script src="js/effects.js"></script>
</body>
</html>
