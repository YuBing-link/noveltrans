<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>术语库 - NovelTrans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../lib/lucide.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' } } } } };
    </script>
    <style>[data-theme="dark"] { color-scheme: dark; } .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }</style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-950/80 glass border-b border-gray-200/60 dark:border-gray-800/60">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <a href="index.html" class="flex items-center gap-2 text-primary-600 dark:text-primary-400 font-bold text-lg"><i data-lucide="book-open" class="w-5 h-5"></i><span>NovelTrans</span></a>
                <div class="hidden md:flex items-center gap-6 text-sm">
                    <a href="index.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">首页</a>
                    <a href="translation.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">翻译</a>
                    <a href="user.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">用户中心</a>
                    <a href="glossary.html" class="font-medium text-primary-600 dark:text-primary-400">术语库</a>
                    <a href="history.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">历史</a>
                </div>
                <div class="flex items-center gap-2">
                    <button id="themeToggle" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i><i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold flex items-center gap-2"><i data-lucide="languages" class="w-6 h-6 text-primary-600"></i>术语库管理</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">管理翻译术语，确保专有名词翻译一致性</p>
            </div>
            <button onclick="openCreateModal()" class="inline-flex items-center gap-2 px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold rounded-xl transition-colors"><i data-lucide="plus" class="w-4 h-4"></i>添加术语</button>
        </div>

        <!-- Terms Table -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200/60 dark:border-gray-800/60">
            <div class="p-4 border-b border-gray-200/60 dark:border-gray-800/60">
                <div class="relative max-w-xs">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="搜索术语..." class="pl-9 pr-4 py-2 text-sm rounded-xl border border-gray-200/60 dark:border-gray-800/60 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 w-full">
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50 dark:bg-gray-800/50">
                        <tr>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">#</th>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">原文</th>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">译文</th>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">备注</th>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">创建时间</th>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">操作</th>
                        </tr>
                    </thead>
                    <tbody id="termsList" class="divide-y divide-gray-200/60 dark:divide-gray-800/60"></tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="w-16 h-16 rounded-2xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center mx-auto mb-4"><i data-lucide="languages" class="w-8 h-8 text-gray-400"></i></div>
            <h3 class="text-lg font-bold mb-2">暂无术语</h3>
            <p class="text-sm text-gray-500 mb-6">添加您的第一个术语，提升专有名词翻译质量</p>
            <button onclick="openCreateModal()" class="inline-flex items-center gap-2 px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-xl transition-colors"><i data-lucide="plus" class="w-4 h-4"></i>添加术语</button>
        </div>
    </main>

    <!-- Create/Edit Term Modal -->
    <div id="termModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50">
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 w-full max-w-md mx-4 shadow-xl">
            <h3 id="modalTitle" class="text-lg font-bold mb-1">添加术语</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">请输入术语的原文和译文</p>
            <input type="hidden" id="editTermId">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1.5">原文 <span class="text-red-500">*</span></label>
                <input type="text" id="termSourceText" placeholder="例如：ソードアート・オンライン" class="w-full px-3 py-2.5 rounded-xl border border-gray-200/60 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1.5">译文 <span class="text-red-500">*</span></label>
                <input type="text" id="termTargetText" placeholder="例如：刀剑神域" class="w-full px-3 py-2.5 rounded-xl border border-gray-200/60 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm">
            </div>
            <div class="mb-5">
                <label class="block text-sm font-medium mb-1.5">备注（可选）</label>
                <textarea id="termRemark" placeholder="例如：SAO 的日文原名" class="w-full px-3 py-2.5 rounded-xl border border-gray-200/60 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm resize-none" rows="2"></textarea>
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="closeTermModal()" class="px-5 py-2 text-sm font-medium rounded-xl border border-gray-200/60 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">取消</button>
                <button onclick="submitTerm()" class="px-5 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-xl transition-colors">保存</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-16 right-4 z-[110] space-y-2 max-w-sm pointer-events-none"></div>

    <script src="../config.js"></script>
    <script src="../js/api-client.js"></script>
    <script src="../js/auth-manager.js"></script>
    <script>
    function initIcons() { lucide.createIcons(); }
    function showToast(type, title, message) {
        const c = document.getElementById('toastContainer');
        const colors = { success: { bg: 'bg-emerald-50 dark:bg-emerald-950/80', border: 'border-emerald-200 dark:border-emerald-800', icon: 'text-emerald-600', title: 'text-emerald-800 dark:text-emerald-200' }, error: { bg: 'bg-red-50 dark:bg-red-950/80', border: 'border-red-200 dark:border-red-800', icon: 'text-red-600', title: 'text-red-800 dark:text-red-200' }, info: { bg: 'bg-primary-50 dark:bg-primary-950/80', border: 'border-primary-200 dark:border-primary-800', icon: 'text-primary-600', title: 'text-primary-800 dark:text-primary-200' } };
        const cl = colors[type] || colors.info;
        const icons = { success: 'check-circle', error: 'x-circle', info: 'info' };
        const t = document.createElement('div'); t.className = `${cl.bg} ${cl.border} border rounded-xl p-4 shadow-lg pointer-events-auto`;
        t.innerHTML = `<div class="flex items-start gap-3"><i data-lucide="${icons[type]}" class="w-5 h-5 ${cl.icon} flex-shrink-0 mt-0.5"></i><div><p class="text-sm font-semibold ${cl.title}">${title}</p><p class="text-xs text-gray-600 dark:text-gray-400 mt-0.5">${message}</p></div></div>`;
        c.appendChild(t); lucide.createIcons(); setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
    }
    function setTheme(dark) { document.documentElement.classList.toggle('dark', dark); localStorage.setItem('theme', dark ? 'dark' : 'light'); }
    (function() { const s = localStorage.getItem('theme'); setTheme(s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)); })();
    document.getElementById('themeToggle').addEventListener('click', () => setTheme(!document.documentElement.classList.contains('dark')));

    let terms = [];
    let isEditMode = false;

    async function loadTerms() {
        const token = localStorage.getItem('authToken');
        if (!token) { window.location.href = 'index.html?modal=login'; return; }
        try {
            const result = await apiClient.getGlossaries();
            // apiClient 返回 { success, data: { success, data: [...], message } }
            const termsData = result.success && result.data ? result.data : result;
            const glossaries = termsData.data || termsData;
            if (glossaries && glossaries.length > 0) {
                terms = glossaries;
                renderTerms(terms);
            } else {
                terms = [];
                renderTerms([]);
            }
        } catch (e) { console.error(e); showToast('error', '错误', '加载术语列表失败'); }
        lucide.createIcons();
    }

    function renderTerms(data) {
        const tbody = document.getElementById('termsList');
        const empty = document.getElementById('emptyState');
        const table = tbody.closest('.bg-white');
        if (data.length === 0) {
            table.classList.add('hidden');
            empty.classList.remove('hidden');
            tbody.innerHTML = '';
        } else {
            table.classList.remove('hidden');
            empty.classList.add('hidden');
            tbody.innerHTML = data.map((term, i) => `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
                    <td class="px-6 py-4 text-sm text-gray-400">${i + 1}</td>
                    <td class="px-6 py-4 text-sm font-medium">${escapeHtml(term.sourceWord || '')}</td>
                    <td class="px-6 py-4 text-sm text-gray-600 dark:text-gray-400">${escapeHtml(term.targetWord || '')}</td>
                    <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-500 max-w-xs truncate">${escapeHtml(term.remark || '—')}</td>
                    <td class="px-6 py-4 text-sm text-gray-400">${formatTime(term.createTime)}</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-1">
                            <button onclick="editTerm(${term.id})" class="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="编辑"><i data-lucide="pencil" class="w-3.5 h-3.5 text-gray-400"></i></button>
                            <button onclick="deleteTerm(${term.id})" class="p-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-950/30 transition-colors" title="删除"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-gray-400 hover:text-red-500"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
    }

    function openCreateModal() {
        isEditMode = false;
        document.getElementById('modalTitle').textContent = '添加术语';
        document.getElementById('termSourceText').value = '';
        document.getElementById('termTargetText').value = '';
        document.getElementById('termRemark').value = '';
        document.getElementById('editTermId').value = '';
        document.getElementById('termModal').classList.remove('hidden');
        setTimeout(() => document.getElementById('termSourceText').focus(), 100);
    }

    function editTerm(id) {
        const term = terms.find(t => t.id === id);
        if (!term) return;
        isEditMode = true;
        document.getElementById('modalTitle').textContent = '编辑术语';
        document.getElementById('termSourceText').value = term.sourceWord || '';
        document.getElementById('termTargetText').value = term.targetWord || '';
        document.getElementById('termRemark').value = term.remark || '';
        document.getElementById('editTermId').value = id;
        document.getElementById('termModal').classList.remove('hidden');
        setTimeout(() => document.getElementById('termSourceText').focus(), 100);
    }

    function closeTermModal() {
        document.getElementById('termModal').classList.add('hidden');
    }

    async function submitTerm() {
        const sourceWord = document.getElementById('termSourceText').value.trim();
        const targetWord = document.getElementById('termTargetText').value.trim();
        const remark = document.getElementById('termRemark').value.trim();
        const id = document.getElementById('editTermId').value;
        if (!sourceWord || !targetWord) { showToast('error', '错误', '请输入原文和译文'); return; }
        try {
            let result;
            if (isEditMode) {
                result = await apiClient.updateGlossary(id, { sourceWord, targetWord, remark });
                if (result.success) { showToast('success', '成功', '术语已更新'); closeTermModal(); loadTerms(); }
                else showToast('error', '失败', '更新失败：' + (result.error || result.message || '未知错误'));
            } else {
                result = await apiClient.createGlossary({ sourceWord, targetWord, remark });
                if (result.success) { showToast('success', '成功', '术语添加成功'); closeTermModal(); loadTerms(); }
                else showToast('error', '失败', '添加失败：' + (result.error || result.message || '未知错误'));
            }
        } catch (e) { showToast('error', '错误', '操作失败：' + e.message); }
    }

    function deleteTerm(id) {
        if (confirm('确定要删除此术语吗？')) {
            apiClient.deleteGlossary(id).then(result => {
                if (result.success) { showToast('success', '成功', '术语已删除'); loadTerms(); }
                else showToast('error', '失败', '删除失败：' + (result.error || result.message || '未知错误'));
            });
        }
    }

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function formatTime(t) {
        if (!t) return '—';
        try {
            if (typeof t === 'string' && t.includes('T')) t = t.replace('T', ' ').split('.')[0];
            return t;
        } catch { return '—'; }
    }

    document.getElementById('searchInput')?.addEventListener('input', function(e) {
        const value = e.target.value.toLowerCase();
        if (!value) { renderTerms(terms); }
        else {
            const filtered = terms.filter(t =>
                (t.sourceWord || '').toLowerCase().includes(value) ||
                (t.targetWord || '').toLowerCase().includes(value) ||
                (t.remark || '').toLowerCase().includes(value)
            );
            renderTerms(filtered);
        }
    });

    document.addEventListener('DOMContentLoaded', () => { initIcons(); loadTerms(); });
    </script>
</body>
</html>
