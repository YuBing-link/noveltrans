<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>术语库 - NovelTrans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../lib/lucide.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' } } } } };
    </script>
    <style>[data-theme="dark"] { color-scheme: dark; } .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }</style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-950/80 glass border-b border-gray-200/60 dark:border-gray-800/60">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <a href="index.html" class="flex items-center gap-2 text-primary-600 dark:text-primary-400 font-bold text-lg"><i data-lucide="book-open" class="w-5 h-5"></i><span>NovelTrans</span></a>
                <div class="hidden md:flex items-center gap-6 text-sm">
                    <a href="index.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">首页</a>
                    <a href="translation.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">翻译</a>
                    <a href="user.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">用户中心</a>
                    <a href="glossary.html" class="font-medium text-primary-600 dark:text-primary-400">术语库</a>
                    <a href="history.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">历史</a>
                </div>
                <div class="flex items-center gap-2">
                    <button id="themeToggle" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i><i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold flex items-center gap-2"><i data-lucide="book-open" class="w-6 h-6 text-primary-600"></i>术语库管理</h1>
            <button onclick="openCreateModal()" class="inline-flex items-center gap-2 px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold rounded-xl transition-colors"><i data-lucide="plus" class="w-4 h-4"></i>创建术语库</button>
        </div>

        <!-- Glossary Cards -->
        <div id="glossaryList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8"></div>

        <!-- Terms Section (hidden until glossary selected) -->
        <div id="termsSection" class="hidden bg-white dark:bg-gray-900 rounded-2xl border border-gray-200/60 dark:border-gray-800/60">
            <div class="p-6 border-b border-gray-200/60 dark:border-gray-800/60">
                <div class="flex items-center justify-between gap-4">
                    <h2 id="termsTitle" class="text-lg font-bold">术语列表</h2>
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="termSearch" placeholder="搜索术语..." class="pl-9 pr-4 py-2 text-sm rounded-xl border border-gray-200/60 dark:border-gray-800/60 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 w-56">
                        </div>
                        <button onclick="addTerm()" class="inline-flex items-center gap-1.5 px-3 py-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold rounded-xl transition-colors"><i data-lucide="plus" class="w-3.5 h-3.5"></i>添加术语</button>
                    </div>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50 dark:bg-gray-800/50">
                        <tr>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">#</th>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">原文</th>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">译文</th>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">语言对</th>
                            <th class="text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider px-6 py-3">操作</th>
                        </tr>
                    </thead>
                    <tbody id="termsList" class="divide-y divide-gray-200/60 dark:divide-gray-800/60"></tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="w-16 h-16 rounded-2xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center mx-auto mb-4"><i data-lucide="book-open" class="w-8 h-8 text-gray-400"></i></div>
            <h3 class="text-lg font-bold mb-2">暂无术语库</h3>
            <p class="text-sm text-gray-500 mb-6">创建您的第一个术语库，开始管理专业术语</p>
            <button onclick="openCreateModal()" class="inline-flex items-center gap-2 px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-xl transition-colors"><i data-lucide="plus" class="w-4 h-4"></i>创建术语库</button>
        </div>
    </main>

    <!-- Create Glossary Modal -->
    <div id="createGlossaryModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50">
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 w-full max-w-md mx-4 shadow-xl">
            <h3 class="text-lg font-bold mb-1">创建术语库</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">请输入术语库的基本信息</p>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1.5">术语库名称 <span class="text-red-500">*</span></label>
                <input type="text" id="newGlossaryName" placeholder="请输入术语库名称" class="w-full px-3 py-2.5 rounded-xl border border-gray-200/60 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm">
            </div>
            <div class="mb-5">
                <label class="block text-sm font-medium mb-1.5">描述（可选）</label>
                <textarea id="newGlossaryDesc" placeholder="请输入术语库描述" class="w-full px-3 py-2.5 rounded-xl border border-gray-200/60 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm resize-none" rows="3"></textarea>
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="closeCreateGlossaryModal()" class="px-5 py-2 text-sm font-medium rounded-xl border border-gray-200/60 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">取消</button>
                <button onclick="submitCreateGlossary()" class="px-5 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-xl transition-colors">创建</button>
            </div>
        </div>
    </div>

    <!-- Term Modal -->
    <div id="termModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50">
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 w-full max-w-md mx-4 shadow-xl">
            <h3 id="termModalTitle" class="text-lg font-bold mb-1">添加术语</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">请输入术语的原文和译文</p>
            <input type="hidden" id="editTermId">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1.5">原文 <span class="text-red-500">*</span></label>
                <input type="text" id="termSourceText" placeholder="请输入原文" class="w-full px-3 py-2.5 rounded-xl border border-gray-200/60 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm">
            </div>
            <div class="mb-5">
                <label class="block text-sm font-medium mb-1.5">译文 <span class="text-red-500">*</span></label>
                <input type="text" id="termTargetText" placeholder="请输入译文" class="w-full px-3 py-2.5 rounded-xl border border-gray-200/60 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm">
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="closeTermModal()" class="px-5 py-2 text-sm font-medium rounded-xl border border-gray-200/60 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">取消</button>
                <button onclick="submitTerm()" class="px-5 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-xl transition-colors">确定</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-16 right-4 z-[110] space-y-2 max-w-sm pointer-events-none"></div>

    <script src="../config.js"></script>
    <script src="../js/api-client.js"></script>
    <script src="../js/auth-manager.js"></script>
    <script>
    function initIcons() { lucide.createIcons(); }
    function showToast(type, title, message) {
        const c = document.getElementById('toastContainer');
        const colors = { success: { bg: 'bg-emerald-50 dark:bg-emerald-950/80', border: 'border-emerald-200 dark:border-emerald-800', icon: 'text-emerald-600', title: 'text-emerald-800 dark:text-emerald-200' }, error: { bg: 'bg-red-50 dark:bg-red-950/80', border: 'border-red-200 dark:border-red-800', icon: 'text-red-600', title: 'text-red-800 dark:text-red-200' }, info: { bg: 'bg-primary-50 dark:bg-primary-950/80', border: 'border-primary-200 dark:border-primary-800', icon: 'text-primary-600', title: 'text-primary-800 dark:text-primary-200' } };
        const cl = colors[type] || colors.info;
        const icons = { success: 'check-circle', error: 'x-circle', info: 'info' };
        const t = document.createElement('div'); t.className = `${cl.bg} ${cl.border} border rounded-xl p-4 shadow-lg pointer-events-auto`;
        t.innerHTML = `<div class="flex items-start gap-3"><i data-lucide="${icons[type]}" class="w-5 h-5 ${cl.icon} flex-shrink-0 mt-0.5"></i><div><p class="text-sm font-semibold ${cl.title}">${title}</p><p class="text-xs text-gray-600 dark:text-gray-400 mt-0.5">${message}</p></div></div>`;
        c.appendChild(t); lucide.createIcons(); setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
    }
    function setTheme(dark) { document.documentElement.classList.toggle('dark', dark); localStorage.setItem('theme', dark ? 'dark' : 'light'); }
    (function() { const s = localStorage.getItem('theme'); setTheme(s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)); })();
    document.getElementById('themeToggle').addEventListener('click', () => setTheme(!document.documentElement.classList.contains('dark')));

    let currentGlossaryId = null;
    let currentTerms = [];
    let isEditMode = false;

    async function loadGlossaries() {
        const token = localStorage.getItem('authToken');
        if (!token) { window.location.href = 'index.html?modal=login'; return; }
        try {
            const result = await apiClient.getGlossaries();
            const container = document.getElementById('glossaryList');
            const empty = document.getElementById('emptyState');
            if (!result.success || !result.data || result.data.length === 0) {
                container.innerHTML = ''; container.classList.add('hidden');
                empty.classList.remove('hidden'); lucide.createIcons(); return;
            }
            empty.classList.add('hidden');
            container.classList.remove('hidden');
            container.innerHTML = result.data.map((g, i) => `
                <div class="bg-white dark:bg-gray-900 rounded-2xl border-2 ${i === 0 ? 'border-primary-500' : 'border-gray-200/60 dark:border-gray-800/60'} p-5 hover:border-primary-300 dark:hover:border-primary-700 transition-all cursor-pointer" onclick="selectGlossary(${g.id}, this)">
                    <div class="flex items-start justify-between mb-3">
                        <div class="w-10 h-10 rounded-xl bg-primary-50 dark:bg-primary-950/30 flex items-center justify-center"><i data-lucide="book-open" class="w-5 h-5 text-primary-600"></i></div>
                        <button onclick="event.stopPropagation(); openGlossaryMenu(${g.id})" class="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><i data-lucide="more-horizontal" class="w-4 h-4 text-gray-400"></i></button>
                    </div>
                    <p class="font-semibold mb-1">${escapeHtml(g.name)}</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mb-4 line-clamp-2">${escapeHtml(g.description || '暂无描述')}</p>
                    <div class="flex items-center justify-between pt-3 border-t border-gray-100 dark:border-gray-800">
                        <span class="text-xs text-gray-500"><span class="font-semibold text-primary-600">${g.termCount || 0}</span> 个术语</span>
                        <span class="text-xs px-2 py-0.5 rounded-full bg-primary-50 dark:bg-primary-950/30 text-primary-600 font-medium">${g.sourceLang || 'auto'}→${g.targetLang || 'zh'}</span>
                    </div>
                </div>
            `).join('');
            if (result.data.length > 0) selectGlossary(result.data[0].id, container.querySelector('.bg-white'));
        } catch (e) { console.error(e); }
        lucide.createIcons();
    }

    async function selectGlossary(id, card) {
        document.querySelectorAll('#glossaryList > div').forEach(c => { c.classList.remove('border-primary-500'); c.classList.add('border-gray-200/60', 'dark:border-gray-800/60'); });
        if (card) { card.classList.add('border-primary-500'); card.classList.remove('border-gray-200/60', 'dark:border-gray-800/60'); }
        currentGlossaryId = id;
        await loadTerms(id);
    }

    async function loadTerms(glossaryId) {
        const section = document.getElementById('termsSection');
        const title = document.getElementById('termsTitle');
        const tbody = document.getElementById('termsList');
        try {
            const result = await apiClient.getTerms(glossaryId);
            if (!result.success || !result.data || result.data.length === 0) {
                section.classList.remove('hidden');
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-12 text-gray-400">暂无术语，点击右上角"添加术语"按钮添加</td></tr>';
                return;
            }
            currentTerms = result.data;
            section.classList.remove('hidden');
            try {
                const glossaryResult = await apiClient.getGlossary(glossaryId);
                if (glossaryResult.success) title.textContent = glossaryResult.data.name + ' — 术语列表';
            } catch {}
            tbody.innerHTML = currentTerms.map((term, i) => `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
                    <td class="px-6 py-4 text-sm text-gray-400">${i + 1}</td>
                    <td class="px-6 py-4 text-sm font-medium">${escapeHtml(term.sourceText)}</td>
                    <td class="px-6 py-4 text-sm text-gray-600 dark:text-gray-400">${escapeHtml(term.targetText)}</td>
                    <td class="px-6 py-4"><span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500">${term.sourceLang || 'auto'}→${term.targetLang || 'zh'}</span></td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-1">
                            <button onclick="editTerm(${term.id})" class="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><i data-lucide="pencil" class="w-3.5 h-3.5 text-gray-400"></i></button>
                            <button onclick="deleteTerm(${term.id})" class="p-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-950/30 transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-gray-400 hover:text-red-500"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        } catch (e) { console.error(e); }
        lucide.createIcons();
    }

    function openCreateModal() {
        const modal = document.getElementById('createGlossaryModal');
        modal.classList.remove('hidden');
        document.getElementById('newGlossaryName').value = '';
        document.getElementById('newGlossaryDesc').value = '';
        document.getElementById('newGlossaryName').focus();
    }
    function closeCreateGlossaryModal(e) { if (!e || e.target === e.currentTarget) document.getElementById('createGlossaryModal').classList.add('hidden'); }
    function closeTermModal(e) { if (!e || e.target === e.currentTarget) document.getElementById('termModal').classList.add('hidden'); }

    async function submitCreateGlossary() {
        const name = document.getElementById('newGlossaryName').value.trim();
        const description = document.getElementById('newGlossaryDesc').value.trim();
        if (!name) { showToast('error', '错误', '请输入术语库名称'); return; }
        try {
            const result = await apiClient.createGlossary({ name, description, sourceLang: 'ja', targetLang: 'zh' });
            if (result.success) { showToast('success', '成功', '术语库创建成功'); closeCreateGlossaryModal(); loadGlossaries(); }
            else showToast('error', '失败', '创建失败：' + result.error);
        } catch (e) { showToast('error', '错误', '创建失败'); }
    }

    function openGlossaryMenu(id) {
        if (confirm('确定要删除此术语库吗？此操作不可恢复！')) {
            apiClient.deleteGlossary(id).then(result => {
                if (result.success) { showToast('success', '成功', '术语库已删除'); loadGlossaries(); }
                else showToast('error', '失败', '删除失败：' + result.error);
            });
        }
    }

    function addTerm() {
        if (!currentGlossaryId) { showToast('info', '提示', '请先选择术语库'); return; }
        isEditMode = false;
        document.getElementById('termModalTitle').textContent = '添加术语';
        document.getElementById('termSourceText').value = '';
        document.getElementById('termTargetText').value = '';
        document.getElementById('editTermId').value = '';
        document.getElementById('termModal').classList.remove('hidden');
        document.getElementById('termSourceText').focus();
    }

    function editTerm(termId) {
        const term = currentTerms.find(t => t.id === termId);
        if (!term) return;
        isEditMode = true;
        document.getElementById('termModalTitle').textContent = '编辑术语';
        document.getElementById('termSourceText').value = term.sourceText;
        document.getElementById('termTargetText').value = term.targetText;
        document.getElementById('editTermId').value = termId;
        document.getElementById('termModal').classList.remove('hidden');
        document.getElementById('termSourceText').focus();
    }

    async function submitTerm() {
        const sourceText = document.getElementById('termSourceText').value.trim();
        const targetText = document.getElementById('termTargetText').value.trim();
        const termId = document.getElementById('editTermId').value;
        if (!sourceText || !targetText) { showToast('error', '错误', '请输入原文和译文'); return; }
        try {
            let result;
            if (isEditMode) {
                result = await apiClient.updateTerm(currentGlossaryId, termId, { sourceText, targetText, description: '' });
                if (result.success) { showToast('success', '成功', '术语已更新'); closeTermModal(); loadTerms(currentGlossaryId); }
                else showToast('error', '失败', '更新失败：' + result.error);
            } else {
                result = await apiClient.addTerm(currentGlossaryId, { sourceText, targetText, description: '' });
                if (result.success) { showToast('success', '成功', '术语添加成功'); closeTermModal(); loadTerms(currentGlossaryId); }
                else showToast('error', '失败', '添加失败：' + result.error);
            }
        } catch (e) { showToast('error', '错误', '操作失败'); }
    }

    function deleteTerm(termId) {
        if (confirm('确定要删除此术语吗？')) {
            apiClient.deleteTerm(currentGlossaryId, termId).then(result => {
                if (result.success) { showToast('success', '成功', '术语已删除'); loadTerms(currentGlossaryId); }
                else showToast('error', '失败', '删除失败：' + result.error);
            });
        }
    }

    document.getElementById('termSearch')?.addEventListener('input', function(e) {
        const value = e.target.value.toLowerCase();
        document.querySelectorAll('#termsList tr').forEach(row => { row.style.display = row.textContent.toLowerCase().includes(value) ? '' : 'none'; });
    });

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    document.addEventListener('DOMContentLoaded', () => { initIcons(); loadGlossaries(); });
    </script>
</body>
</html>
