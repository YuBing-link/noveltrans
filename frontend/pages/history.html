<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻译历史 - NovelTrans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../lib/lucide.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' } } } } };
    </script>
    <style>[data-theme="dark"] { color-scheme: dark; } .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }</style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-950/80 glass border-b border-gray-200/60 dark:border-gray-800/60">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <a href="index.html" class="flex items-center gap-2 text-primary-600 dark:text-primary-400 font-bold text-lg"><i data-lucide="book-open" class="w-5 h-5"></i><span>NovelTrans</span></a>
                <div class="hidden md:flex items-center gap-6 text-sm">
                    <a href="index.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">首页</a>
                    <a href="translation.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">翻译</a>
                    <a href="user.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">用户中心</a>
                    <a href="history.html" class="font-medium text-primary-600 dark:text-primary-400">历史</a>
                    <a href="glossary.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">术语库</a>
                </div>
                <div class="flex items-center gap-2">
                    <button id="themeToggle" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i><i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold flex items-center gap-2"><i data-lucide="clock" class="w-6 h-6 text-primary-600"></i>翻译历史</h1>
            <a href="translation.html" class="inline-flex items-center gap-2 px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold rounded-xl transition-colors"><i data-lucide="plus" class="w-4 h-4"></i>新建翻译</a>
        </div>

        <!-- Filter -->
        <div class="flex items-center gap-3 mb-6">
            <div class="flex items-center gap-2 bg-white dark:bg-gray-900 rounded-xl border border-gray-200/60 dark:border-gray-800/60 p-1">
                <button class="filter-btn active px-3 py-1.5 text-sm font-medium rounded-lg transition-colors" data-filter="all">全部</button>
                <button class="filter-btn px-3 py-1.5 text-sm font-medium text-gray-500 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" data-filter="completed">已完成</button>
                <button class="filter-btn px-3 py-1.5 text-sm font-medium text-gray-500 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" data-filter="processing">翻译中</button>
            </div>
            <div class="flex-1"></div>
            <div class="relative">
                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="搜索文件名..." class="pl-9 pr-4 py-2 text-sm rounded-xl border border-gray-200/60 dark:border-gray-800/60 bg-white dark:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-primary-500 w-56">
            </div>
        </div>

        <!-- History List -->
        <div id="historyList" class="space-y-3"></div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="w-16 h-16 rounded-2xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center mx-auto mb-4"><i data-lucide="inbox" class="w-8 h-8 text-gray-400"></i></div>
            <h3 class="text-lg font-bold mb-2">暂无翻译记录</h3>
            <p class="text-sm text-gray-500 mb-6">上传第一份文档开始翻译吧</p>
            <a href="translation.html" class="inline-flex items-center gap-2 px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-xl transition-colors">开始翻译</a>
        </div>
    </main>

    <script src="../config.js"></script>
    <script src="../js/api-client.js"></script>
    <script>
    function initIcons() { lucide.createIcons(); }
    function setTheme(dark) { document.documentElement.classList.toggle('dark', dark); localStorage.setItem('theme', dark ? 'dark' : 'light'); }
    (function() { const s = localStorage.getItem('theme'); setTheme(s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)); })();
    document.getElementById('themeToggle').addEventListener('click', () => setTheme(!document.documentElement.classList.contains('dark')));

    // Filter state
    let currentFilter = 'all';
    let allHistoryItems = [];

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active', 'bg-gray-100', 'dark:bg-gray-800', 'text-gray-900', 'dark:text-gray-100'); b.classList.add('text-gray-500'); });
            btn.classList.add('active', 'bg-gray-100', 'dark:bg-gray-800', 'text-gray-900', 'dark:text-gray-100');
            btn.classList.remove('text-gray-500');
            currentFilter = btn.dataset.filter;
            renderHistory();
        });
    });
    document.querySelector('.filter-btn.active')?.classList.add('bg-gray-100', 'dark:bg-gray-800', 'text-gray-900', 'dark:text-gray-100');

    document.getElementById('searchInput')?.addEventListener('input', function() { renderHistory(); });

    function formatTime(ts) {
        if (!ts) return '';
        const d = new Date(ts);
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
    function formatSize(bytes) { if (!bytes) return '--'; if (bytes < 1024) return bytes + ' B'; if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB'; return (bytes / 1048576).toFixed(1) + ' MB'; }

    const STATUS_MAP = {
        pending: { text: '待处理', bg: 'bg-amber-100 dark:bg-amber-900/40', color: 'text-amber-700 dark:text-amber-300', icon: 'clock', iconBg: 'bg-amber-50 dark:bg-amber-950/30', iconColor: 'text-amber-600' },
        processing: { text: '翻译中', bg: 'bg-blue-100 dark:bg-blue-900/40', color: 'text-blue-700 dark:text-blue-300', icon: 'loader', iconBg: 'bg-blue-50 dark:bg-blue-950/30', iconColor: 'text-blue-600', animate: true },
        completed: { text: '已完成', bg: 'bg-emerald-100 dark:bg-emerald-900/40', color: 'text-emerald-700 dark:text-emerald-300', icon: 'file-check', iconBg: 'bg-emerald-50 dark:bg-emerald-950/30', iconColor: 'text-emerald-600' },
        failed: { text: '失败', bg: 'bg-red-100 dark:bg-red-900/40', color: 'text-red-700 dark:text-red-300', icon: 'x-circle', iconBg: 'bg-red-50 dark:bg-red-950/30', iconColor: 'text-red-600' }
    };

    function renderHistory() {
        const q = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let items = allHistoryItems;
        if (currentFilter !== 'all') items = items.filter(i => i.status === currentFilter);
        if (q) items = items.filter(i => (i.name || '').toLowerCase().includes(q));

        const list = document.getElementById('historyList');
        const empty = document.getElementById('emptyState');
        if (items.length === 0) { list.innerHTML = ''; empty.classList.remove('hidden'); lucide.createIcons(); return; }
        empty.classList.add('hidden');

        list.innerHTML = items.map(item => {
            const s = STATUS_MAP[item.status] || STATUS_MAP.pending;
            return `<div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200/60 dark:border-gray-800/60 p-4 hover:border-primary-300 dark:hover:border-primary-700 transition-colors cursor-pointer" data-status="${item.status}">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl ${s.iconBg} flex items-center justify-center flex-shrink-0"><i data-lucide="${s.icon}" class="w-5 h-5 ${s.iconColor}${s.animate ? ' animate-spin' : ''}"></i></div>
                    <div class="flex-1 min-w-0">
                        <p class="font-medium truncate">${escapeHtml(item.name || '未命名文档')}</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400">${formatTime(item.createTime)}</p>
                    </div>
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-medium">${formatSize(item.fileSize)}</p>
                    </div>
                    <span class="px-2.5 py-1 text-xs font-semibold rounded-full ${s.bg} ${s.color}">${s.text}</span>
                </div>
            </div>`;
        }).join('');
        lucide.createIcons();
    }

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    async function loadHistory() {
        const token = localStorage.getItem('authToken');
        if (!token) { window.location.href = 'index.html?modal=login'; return; }
        try {
            const res = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.USER_API_PATH}/translation-history?page=1&pageSize=50&type=all`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await res.json();
            // 后端返回 { success, data: { list: [...], page, pageSize, total }, message }
            if (result.success && result.data) {
                const items = result.data.list || result.data.data || result.data || [];
                allHistoryItems = items.map(item => ({
                    id: item.id,
                    taskId: item.taskId,
                    type: item.type,
                    name: item.type === 'document' ? (item.documentName || '文档翻译') : (item.sourceTextPreview || '文本翻译'),
                    sourceTextPreview: item.sourceTextPreview || '',
                    targetTextPreview: item.targetTextPreview || '',
                    sourceLang: item.sourceLang || 'auto',
                    targetLang: item.targetLang || '',
                    createTime: item.createTime,
                    status: item.status || 'completed',
                    fileSize: null
                }));
            }
        } catch { /* ignore */ }
        renderHistory();
    }

    document.addEventListener('DOMContentLoaded', () => { initIcons(); loadHistory(); });
    </script>
</body>
</html>
