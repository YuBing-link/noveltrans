<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 - NovelTrans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../lib/lucide.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' } } } } };
    </script>
    <style>[data-theme="dark"] { color-scheme: dark; } .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }</style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-950/80 glass border-b border-gray-200/60 dark:border-gray-800/60">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <a href="index.html" class="flex items-center gap-2 text-primary-600 dark:text-primary-400 font-bold text-lg"><i data-lucide="book-open" class="w-5 h-5"></i><span>NovelTrans</span></a>
                <div class="hidden md:flex items-center gap-6 text-sm">
                    <a href="index.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">首页</a>
                    <a href="translation.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">翻译</a>
                    <a href="user.html" class="font-medium text-primary-600 dark:text-primary-400">用户中心</a>
                    <a href="history.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">历史</a>
                    <a href="glossary.html" class="text-gray-500 dark:text-gray-400 hover:text-primary-600 transition-colors">术语库</a>
                </div>
                <div class="flex items-center gap-2">
                    <button id="themeToggle" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i><i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Profile Header -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200/60 dark:border-gray-800/60 p-6 mb-6">
            <div class="flex items-center gap-4">
                <div id="userAvatarLarge" class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center text-white text-2xl font-bold">U</div>
                <div class="flex-1">
                    <h1 id="displayName" class="text-xl font-bold">加载中...</h1>
                    <p id="displayEmail" class="text-sm text-gray-500 dark:text-gray-400">正在获取用户信息</p>
                </div>
                <button id="logoutBtn" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    退出登录
                </button>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
            <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200/60 dark:border-gray-800/60 p-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-xl bg-blue-50 dark:bg-blue-950/30 flex items-center justify-center"><i data-lucide="file-text" class="w-5 h-5 text-blue-600"></i></div>
                    <span class="text-sm text-gray-500 dark:text-gray-400">翻译文档</span>
                </div>
                <p id="statDocs" class="text-2xl font-bold">--</p>
            </div>
            <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200/60 dark:border-gray-800/60 p-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-xl bg-green-50 dark:bg-green-950/30 flex items-center justify-center"><i data-lucide="type" class="w-5 h-5 text-green-600"></i></div>
                    <span class="text-sm text-gray-500 dark:text-gray-400">翻译字数</span>
                </div>
                <p id="statWords" class="text-2xl font-bold">--</p>
            </div>
            <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200/60 dark:border-gray-800/60 p-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-xl bg-purple-50 dark:bg-purple-950/30 flex items-center justify-center"><i data-lucide="clock" class="w-5 h-5 text-purple-600"></i></div>
                    <span class="text-sm text-gray-500 dark:text-gray-400">使用时长</span>
                </div>
                <p id="statDays" class="text-2xl font-bold">--</p>
            </div>
        </div>

        <!-- Settings -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200/60 dark:border-gray-800/60 divide-y divide-gray-200/60 dark:divide-gray-800/60">
            <div class="p-6">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="settings" class="w-5 h-5 text-gray-400"></i>账户设置</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between py-3"><div><p class="font-medium">用户名</p><p id="settingsUsername" class="text-sm text-gray-500">加载中...</p></div><button class="text-sm text-primary-600 hover:underline">修改</button></div>
                    <div class="flex items-center justify-between py-3"><div><p class="font-medium">邮箱</p><p id="settingsEmail" class="text-sm text-gray-500">加载中...</p></div><button class="text-sm text-primary-600 hover:underline">修改</button></div>
                    <div class="flex items-center justify-between py-3"><div><p class="font-medium">密码</p><p class="text-sm text-gray-500">**** **** ****</p></div><button class="text-sm text-primary-600 hover:underline">修改</button></div>
                </div>
            </div>
            <div class="p-6">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="key" class="w-5 h-5 text-gray-400"></i>API 密钥</h2>
                <div id="apiKeySection">
                    <div class="flex items-center gap-2 mb-3">
                        <code id="apiKeyDisplay" class="flex-1 px-4 py-2.5 bg-gray-50 dark:bg-gray-800 rounded-xl text-sm font-mono text-gray-600 dark:text-gray-400 truncate">加载中...</code>
                        <button id="showApiKey" class="p-2.5 rounded-xl border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" title="显示完整密钥"><i data-lucide="eye" class="w-4 h-4"></i></button>
                        <button id="copyApiKey" class="p-2.5 rounded-xl border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" title="复制"><i data-lucide="copy" class="w-4 h-4"></i></button>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="generateApiKey" class="px-3 py-1.5 text-xs font-medium text-primary-600 bg-primary-50 dark:bg-primary-950/30 rounded-lg hover:bg-primary-100 dark:hover:bg-primary-950/50 transition-colors">生成新密钥</button>
                        <button id="resetApiKey" class="px-3 py-1.5 text-xs font-medium text-amber-600 bg-amber-50 dark:bg-amber-950/30 rounded-lg hover:bg-amber-100 dark:hover:bg-amber-950/50 transition-colors">重置密钥</button>
                    </div>
                    <p class="text-xs text-gray-400 mt-2">授权头格式：Authorization: Bearer nt_sk_xxxx</p>
                </div>
                <!-- API Key List -->
                <div id="apiKeyList" class="space-y-2 mt-4 hidden"></div>
            </div>
            <div class="p-6">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="zap" class="w-5 h-5 text-gray-400"></i>字符包</h2>
                <div id="quotaSection">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-sm text-gray-500">当前档位</span>
                        <span id="quotaLevel" class="px-2.5 py-1 text-xs font-semibold rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400">--</span>
                    </div>
                    <div class="mb-4">
                        <div class="flex items-center justify-between mb-1.5">
                            <span class="text-sm text-gray-500">本月使用</span>
                            <span id="quotaUsage" class="text-sm font-medium">-- / --</span>
                        </div>
                        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5">
                            <div id="quotaBar" class="bg-primary-600 h-2.5 rounded-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-3 text-center">
                        <div class="p-2 rounded-lg bg-gray-50 dark:bg-gray-800">
                            <p class="text-xs text-gray-400 mb-1">快速模式 ×0.5</p>
                            <p id="quotaFast" class="text-sm font-semibold">--</p>
                        </div>
                        <div class="p-2 rounded-lg bg-gray-50 dark:bg-gray-800">
                            <p class="text-xs text-gray-400 mb-1">专家模式 ×1.0</p>
                            <p id="quotaExpert" class="text-sm font-semibold">--</p>
                        </div>
                        <div class="p-2 rounded-lg bg-gray-50 dark:bg-gray-800">
                            <p class="text-xs text-gray-400 mb-1">团队模式 ×2.0</p>
                            <p id="quotaTeam" class="text-sm font-semibold">--</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="p-6">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="bell" class="w-5 h-5 text-gray-400"></i>通知设置</h2>
                <div class="space-y-3">
                    <label class="flex items-center justify-between cursor-pointer"><span class="text-sm font-medium">翻译完成通知</span><input type="checkbox" checked class="rounded border-gray-300 text-primary-600 focus:ring-primary-500"></label>
                    <label class="flex items-center justify-between cursor-pointer"><span class="text-sm font-medium">邮件通知</span><input type="checkbox" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500"></label>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="fixed top-16 right-4 z-[110] space-y-2 max-w-sm pointer-events-none"></div>

    <script src="../config.js"></script>
    <script src="../js/api-client.js"></script>
    <script src="../js/auth-manager.js"></script>
    <script>
    function initIcons() { lucide.createIcons(); }
    function showToast(type, title, message) {
        const c = document.getElementById('toastContainer');
        const colors = { success: { bg: 'bg-emerald-50 dark:bg-emerald-950/80', border: 'border-emerald-200 dark:border-emerald-800', icon: 'text-emerald-600', title: 'text-emerald-800 dark:text-emerald-200' }, error: { bg: 'bg-red-50 dark:bg-red-950/80', border: 'border-red-200 dark:border-red-800', icon: 'text-red-600', title: 'text-red-800 dark:text-red-200' }, info: { bg: 'bg-primary-50 dark:bg-primary-950/80', border: 'border-primary-200 dark:border-primary-800', icon: 'text-primary-600', title: 'text-primary-800 dark:text-primary-200' } };
        const cl = colors[type] || colors.info;
        const icons = { success: 'check-circle', error: 'x-circle', info: 'info' };
        const t = document.createElement('div'); t.className = `${cl.bg} ${cl.border} border rounded-xl p-4 shadow-lg pointer-events-auto`;
        t.innerHTML = `<div class="flex items-start gap-3"><i data-lucide="${icons[type]}" class="w-5 h-5 ${cl.icon} flex-shrink-0 mt-0.5"></i><div><p class="text-sm font-semibold ${cl.title}">${title}</p><p class="text-xs text-gray-600 dark:text-gray-400 mt-0.5">${message}</p></div></div>`;
        c.appendChild(t); lucide.createIcons(); setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
    }
    function setTheme(dark) { document.documentElement.classList.toggle('dark', dark); localStorage.setItem('theme', dark ? 'dark' : 'light'); }
    (function() { const s = localStorage.getItem('theme'); setTheme(s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)); })();
    document.getElementById('themeToggle').addEventListener('click', () => setTheme(!document.documentElement.classList.contains('dark')));

    (async function() {
        const token = localStorage.getItem('authToken');
        if (!token) { window.location.href = 'index.html?modal=login'; return; }

        // 加载用户信息
        try {
            const profileRes = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.USER_API_PATH}/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const profile = await profileRes.json();
            if (profile.success && profile.data) {
                const u = profile.data;
                const name = u.username || u.email || '用户';
                document.getElementById('displayName').textContent = name;
                document.getElementById('displayEmail').textContent = u.email || '未知邮箱';
                document.getElementById('userAvatarLarge').textContent = name.charAt(0).toUpperCase();
                document.getElementById('settingsUsername').textContent = name;
                document.getElementById('settingsEmail').textContent = u.email || '未知邮箱';
            }
        } catch { /* use localStorage fallback */ }

        // 从 localStorage 获取基本用户信息作为后备
        const user = JSON.parse(localStorage.getItem('userInfo') || '{}');
        if (!document.getElementById('displayName').textContent || document.getElementById('displayName').textContent === '加载中...') {
            const name = user.userName || user.username || user.email || '用户';
            document.getElementById('displayName').textContent = name;
            document.getElementById('displayEmail').textContent = user.email || '未知邮箱';
            document.getElementById('userAvatarLarge').textContent = name.charAt(0).toUpperCase();
            document.getElementById('settingsUsername').textContent = name;
            document.getElementById('settingsEmail').textContent = user.email || '未知邮箱';
        }

        // 加载 API Key 列表
        try {
            const keysRes = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.USER_API_PATH}/api-keys`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const keysResult = await keysRes.json();
            if (keysResult.success && keysResult.data && keysResult.data.length > 0) {
                document.getElementById('apiKeyDisplay').textContent = keysResult.data[0].apiKey;
            } else {
                document.getElementById('apiKeyDisplay').textContent = '暂未生成 API 密钥';
            }
        } catch { document.getElementById('apiKeyDisplay').textContent = '加载失败'; }

        // 加载用户统计数据
        try {
            const statsRes = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.USER_API_PATH}/statistics`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const stats = await statsRes.json();
            if (stats.success && stats.data) {
                const d = stats.data;
                document.getElementById('statDocs').textContent = d.totalDocuments || d.totalTranslations || 0;
                document.getElementById('statWords').textContent = (d.totalCharacters || 0).toLocaleString();
                const regDays = user.createTime ? Math.floor((Date.now() - new Date(user.createTime).getTime()) / 86400000) : 0;
                document.getElementById('statDays').textContent = regDays + ' 天';
            }
        } catch {
            document.getElementById('statDocs').textContent = '--';
            document.getElementById('statWords').textContent = '--';
            document.getElementById('statDays').textContent = '--';
        }

        // 加载配额信息
        try {
            const quotaRes = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.USER_API_PATH}/quota`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const quotaResult = await quotaRes.json();
            if (quotaResult.success && quotaResult.data) {
                const q = quotaResult.data;
                const levelMap = { FREE: 'Free 免费', PRO: 'Pro 专业', MAX: 'Max 旗舰' };
                document.getElementById('quotaLevel').textContent = levelMap[q.userLevel] || q.userLevel;
                document.getElementById('quotaUsage').textContent = `${(q.usedThisMonth || 0).toLocaleString()} / ${(q.monthlyChars || 0).toLocaleString()}`;
                const pct = q.monthlyChars > 0 ? Math.min(100, ((q.usedThisMonth || 0) / q.monthlyChars) * 100) : 0;
                document.getElementById('quotaBar').style.width = pct + '%';
                if (pct > 80) document.getElementById('quotaBar').className = 'bg-red-500 h-2.5 rounded-full transition-all';
                else if (pct > 50) document.getElementById('quotaBar').className = 'bg-amber-500 h-2.5 rounded-full transition-all';
                document.getElementById('quotaFast').textContent = q.fastModeEquivalent ? (q.fastModeEquivalent / 1000).toFixed(1) + 'K' : '--';
                document.getElementById('quotaExpert').textContent = q.expertModeEquivalent ? (q.expertModeEquivalent / 1000).toFixed(1) + 'K' : '--';
                document.getElementById('quotaTeam').textContent = q.teamModeEquivalent ? (q.teamModeEquivalent / 1000).toFixed(1) + 'K' : '--';
            }
        } catch { /* ignore */ }
    })();
    document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('authToken'); localStorage.removeItem('userInfo'); window.location.href = 'index.html'; });
    document.getElementById('copyApiKey')?.addEventListener('click', () => { navigator.clipboard.writeText(document.getElementById('apiKeyDisplay').textContent); showToast('success', '已复制', 'API 密钥已复制'); });
    document.getElementById('showApiKey')?.addEventListener('click', async () => {
        const token = localStorage.getItem('authToken');
        try {
            const res = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.USER_API_PATH}/api-keys`, { headers: { 'Authorization': `Bearer ${token}` } });
            const result = await res.json();
            if (result.success && result.data && result.data.length > 0) {
                const key = result.data[0].apiKey;
                document.getElementById('apiKeyDisplay').textContent = key;
                showToast('info', '完整密钥', '请妥善保管，不要分享给他人');
            }
        } catch { showToast('error', '错误', '获取 API 密钥失败'); }
    });
    document.getElementById('generateApiKey')?.addEventListener('click', async () => {
        if (!confirm('生成新的 API 密钥后，请在安全的地方保存')) return;
        const token = localStorage.getItem('authToken');
        try {
            const res = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.USER_API_PATH}/api-keys`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'Default' })
            });
            const result = await res.json();
            if (result.success && result.data) {
                document.getElementById('apiKeyDisplay').textContent = result.data.apiKey;
                showToast('success', '生成成功', '请妥善保管此密钥');
            }
        } catch { showToast('error', '错误', '生成 API 密钥失败'); }
    });
    document.getElementById('resetApiKey')?.addEventListener('click', async () => {
        if (!confirm('重置 API 密钥后，旧密钥将失效。确定继续？')) return;
        const token = localStorage.getItem('authToken');
        try {
            const res = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.USER_API_PATH}/api-keys`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await res.json();
            if (result.success && result.data && result.data.length > 0) {
                const keyId = result.data[0].id;
                const resetRes = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.USER_API_PATH}/api-keys/${keyId}/reset`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                });
                const resetResult = await resetRes.json();
                if (resetResult.success) {
                    document.getElementById('apiKeyDisplay').textContent = resetResult.data.apiKey;
                    showToast('success', '重置成功', '旧密钥已失效，请妥善保管新密钥');
                }
            } else {
                showToast('info', '提示', '没有可重置的密钥，请先"生成新密钥"');
            }
        } catch { showToast('error', '错误', '重置 API 密钥失败'); }
    });
    document.addEventListener('DOMContentLoaded', initIcons);
    </script>
</body>
</html>
