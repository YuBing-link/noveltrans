worker_processes  1;                                                                                                                                                                                                                                                                                                          
  events {
      worker_connections  1024;
  }

  http {

      log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$proxy_add_x_forwarded_for" '
                        '"$upstream_addr" "$upstream_status" "$request_uri"';

      access_log  /var/log/nginx/access.log  main;

      include       mime.types;
      default_type  application/octet-stream;

      # 针对Chrome扩展等特殊来源的CORS处理
      map $http_origin $cors_origin {
          default "*";
          "~^chrome-extension://" $http_origin;
          "https://localhost" "https://localhost";
          "https://127.0.0.1" "https://127.0.0.1";
      }

      # Docker 内部 DNS 解析器，防止容器重启后 IP 缓存问题
      resolver 127.0.0.11 valid=10s ipv6=off;

      # 上游服务器定义
      upstream backend_java {
          server backend:8080;
          keepalive 32;
      }

      # 映射是否可重试（仅 502/503/504 重试一次，防重复提交）
      map $request_method $retry {
          GET     1;
          HEAD    1;
          OPTIONS 1;
          default 0;
      }

      server {
          listen       7341;  # 网关监听 7341 端口
          server_name  localhost;
          client_max_body_size 50m;  # 允许最大上传文件大小 50MB

          # 用户认证 API 路由
          location /user/ {
              # 设置CORS头部
              add_header 'Access-Control-Allow-Origin' $cors_origin always;
              add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
              add_header 'Access-Control-Allow-Headers'
  'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Translation-Engine' always;

              # 处理预检请求
              if ($request_method = 'OPTIONS') {
                  add_header 'Access-Control-Allow-Origin' $cors_origin;
                  add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                  add_header 'Access-Control-Allow-Headers'
  'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Translation-Engine';
                  add_header 'Access-Control-Max-Age' 1728000;
                  add_header 'Content-Length' 0;
                  return 204;
              }

              proxy_pass http://backend_java;
              proxy_http_version 1.1;
              proxy_set_header Connection "";
              proxy_buffering off;
              proxy_cache off;
              proxy_set_header Host $host;
              proxy_connect_timeout 60s;
              proxy_send_timeout 120s;
              proxy_read_timeout 120s;
              send_timeout 120s;
              proxy_next_upstream error timeout http_502 http_503 http_504;
              proxy_next_upstream_tries 2;
          }

          # 翻译 API 路由 - 专门针对翻译API的CORS配置
          location /v1 {
              # 设置CORS头部，使用map变量避免重复
              add_header 'Access-Control-Allow-Origin' $cors_origin always;
              add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
              add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Translation-Engine' always;

              # 处理预检请求
              if ($request_method = 'OPTIONS') {
                  add_header 'Access-Control-Allow-Origin' $cors_origin;
                  add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                  add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Translation-Engine';
                  add_header 'Access-Control-Max-Age' 1728000;
                  add_header 'Content-Length' 0;
                  return 204;
              }

              proxy_pass http://backend_java;
              proxy_http_version 1.1;
              proxy_set_header Connection "";
              proxy_buffering off;
              proxy_cache off;
              proxy_set_header Host $host;
              proxy_connect_timeout 60s;
              proxy_send_timeout 120s;
              proxy_read_timeout 120s;
              send_timeout 120s;
              proxy_next_upstream error timeout http_502 http_503 http_504;
              proxy_next_upstream_tries 2;
          }

          # 平台 API 路由（公开接口，如平台统计）
          location /platform/ {
              add_header 'Access-Control-Allow-Origin' $cors_origin always;
              add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
              add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

              if ($request_method = 'OPTIONS') {
                  add_header 'Access-Control-Allow-Origin' $cors_origin;
                  add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                  add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
                  add_header 'Access-Control-Max-Age' 1728000;
                  add_header 'Content-Length' 0;
                  return 204;
              }

              proxy_pass http://backend_java;
              proxy_http_version 1.1;
              proxy_set_header Connection "";
              proxy_set_header Host $host;
              proxy_next_upstream error timeout http_502 http_503 http_504;
              proxy_next_upstream_tries 2;
          }

          # Spring Boot Actuator 路由（健康检查、系统信息）
          location /actuator/ {
              proxy_pass http://backend_java;
              proxy_http_version 1.1;
              proxy_set_header Connection "";
              proxy_set_header Host $host;
          }

          # ===== 前端静态资源（React SPA - Vite 构建产物） =====
          # 先匹配 API 路由，其余全部交给前端处理
          location / {
              root   web-app/dist;
              try_files $uri $uri/ /index.html;
              add_header 'Access-Control-Allow-Origin' $cors_origin always;
          }

          # 静态资源缓存策略
          location ~* \.(js|css)$ {
              root   web-app/dist;
              expires 1d;
              add_header 'Access-Control-Allow-Origin' $cors_origin always;
          }

          location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
              root   web-app/dist;
              expires 7d;
              add_header 'Access-Control-Allow-Origin' $cors_origin always;
          }
      }
  }