worker_processes  1;
  events {
      worker_connections  1024;
  }

  http {

      log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$proxy_add_x_forwarded_for" '
                        '"$upstream_addr" "$upstream_status" "$request_uri"';

      access_log  /var/log/nginx/access.log  main;

      include       mime.types;
      default_type  application/octet-stream;

      # 针对Chrome扩展等特殊来源的CORS处理
      map $http_origin $cors_origin {
          default "*";
          "~^chrome-extension://" $http_origin;
          "https://localhost" "https://localhost";
          "https://127.0.0.1" "https://127.0.0.1";
      }

      # Docker 内部 DNS 解析器，防止容器重启后 IP 缓存问题
      resolver 127.0.0.11 valid=10s ipv6=off;

      # 上游服务器定义
      upstream backend_java {
          server host.docker.internal:8080;
          keepalive 32;
      }

      server {
          listen       7341;  # 网关监听 7341 端口
          server_name  localhost;
          client_max_body_size 50m;  # 允许最大上传文件大小 50MB

          # ===== 前端静态资源 =====
          location / {
              root   web-app/dist;
              try_files $uri $uri/ /index.html;
              add_header 'Access-Control-Allow-Origin' $cors_origin always;
          }

          location ~* \.(js|css)$ {
              root   web-app/dist;
              expires 1d;
              add_header 'Access-Control-Allow-Origin' $cors_origin always;
          }

          location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
              root   web-app/dist;
              expires 7d;
              add_header 'Access-Control-Allow-Origin' $cors_origin always;
          }

          # ===== Webhook 代理（不剥离前缀） =====
          location /webhook/ {
              add_header 'Access-Control-Allow-Origin' $cors_origin always;
              add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
              add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

              if ($request_method = 'OPTIONS') {
                  add_header 'Access-Control-Allow-Origin' $cors_origin;
                  add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                  add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                  add_header 'Content-Length' 0;
                  add_header 'Access-Control-Max-Age' 1728000;
                  return 204;
              }

              proxy_pass http://backend_java;
              proxy_http_version 1.1;
              proxy_set_header Connection "";
              proxy_buffering off;
              proxy_cache off;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_connect_timeout 60s;
              proxy_send_timeout 120s;
              proxy_read_timeout 120s;
          }

          # ===== API 代理（统一 /api/ 前缀，自动剥离 /api 后转发） =====
          location /api/ {
              rewrite ^/api(/.*)$ $1 break;

              add_header 'Access-Control-Allow-Origin' $cors_origin always;
              add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
              add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Translation-Engine' always;

              if ($request_method = 'OPTIONS') {
                  add_header 'Access-Control-Allow-Origin' $cors_origin;
                  add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                  add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Translation-Engine';
                  add_header 'Content-Length' 0;
                  add_header 'Access-Control-Max-Age' 1728000;
                  return 204;
              }

              proxy_pass http://backend_java;
              proxy_http_version 1.1;
              proxy_set_header Connection "";
              proxy_buffering off;
              proxy_cache off;
              proxy_set_header Host $host;
              proxy_connect_timeout 60s;
              proxy_send_timeout 120s;
              proxy_read_timeout 120s;
              send_timeout 120s;
              proxy_next_upstream error timeout http_502 http_503 http_504;
              proxy_next_upstream_tries 2;
          }
      }
  }
