spring:
  application:
    name: novelTranslator
  mvc:
    async:
      request-timeout: 300000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:novel_translator}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1200000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 256
          max-idle: 128
          min-idle: 32
  sql:
    init:
      schema-locations: classpath:sql/schema.sql
      mode: never
  threads:
    virtual:
      enabled: true
  mail:
    # 邮件服务器配置
    # 注意：使用QQ邮箱时，请按照以下步骤操作：
    # 1. 登录QQ邮箱网页版
    # 2. 进入"设置" -> "账户"
    # 3. 开启"IMAP/SMTP服务"
    # 4. 生成应用专用密码（而非使用QQ密码）
    # 5. 将应用专用密码设置为环境变量 QQSTMP
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:}  # 邮箱地址
    password: ${MAIL_PASSWORD:}  # 邮箱 SMTP 授权码
    default-encoding: UTF-8
    properties:
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.required: true
      mail.smtp.auth: true
      mail.smtp.starttls.enable: false
      mail.smtp.socketFactory.port: 465
      mail.smtp.socketFactory.class: javax.net.ssl.SSLSocketFactory
      mail.smtp.socketFactory.fallback: false
  thymeleaf:
    cache: false
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML

server:
  port: 8080
  undertow:
    threads:
      io: 32
      worker: 200
    options:
      socket:
        RECEIVE_BUFFER: 65536
        SEND_BUFFER: 65536
  servlet:
    encoding:
      force: true
      charset: UTF-8
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # SQLite 不支持获取自动生成的键
    use-generated-keys: false
  global-config:
    db-config:
      id-type: assign_id  # 使用雪花算法生成 ID，避免 SQLite 自增主键问题

translation:
  ip-rate-limit:
    max-requests: ${TRANSLATION_IP_RATE_LIMIT_MAX_REQUESTS:-100}
    window-seconds: ${TRANSLATION_IP_RATE_LIMIT_WINDOW_SECONDS:-60}
  key-rate-limit:
    max-requests: ${TRANSLATION_KEY_RATE_LIMIT_MAX_REQUESTS:-1000}
    window-seconds: ${TRANSLATION_KEY_RATE_LIMIT_WINDOW_SECONDS:-60}
  external:
    max-chars: 5000  # 外部 API 单次请求最大字符数
  openai:
    api-key: "${TRANSLATION_OPENAI_API_KEY:}"  # 必须通过环境变量 TRANSLATION_OPENAI_API_KEY 配置
    base-url: "https://api.openai.com"
  python:
    url: "${PYTHON_TRANSLATE_URL:http://llm-engine:8000/translate}"  # Python 翻译服务地址
    api-key: "${TRANSLATE_SERVICE_API_KEY:}"  # 服务间认证 Key（可选，生产环境必填）
  limit:
    free-daily-limit: ${TRANSLATION_LIMIT_FREE_DAILY:-500}
    pro-daily-limit: ${TRANSLATION_LIMIT_PRO_DAILY:-5000}
    max-daily-limit: ${TRANSLATION_LIMIT_MAX_DAILY:-999999999}
    free-concurrency-limit: ${TRANSLATION_LIMIT_FREE_CONCURRENCY:-10}
    pro-concurrency-limit: ${TRANSLATION_LIMIT_PRO_CONCURRENCY:-50}
    max-concurrency-limit: ${TRANSLATION_LIMIT_MAX_CONCURRENCY:-100}
    anonymous-concurrency-limit: ${TRANSLATION_LIMIT_ANONYMOUS_CONCURRENCY:-5}
    free-tpm-limit: ${TRANSLATION_LIMIT_FREE_TPM:-10000}
    pro-tpm-limit: ${TRANSLATION_LIMIT_PRO_TPM:-50000}
    max-tpm-limit: ${TRANSLATION_LIMIT_MAX_TPM:-200000}
    anonymous-tpm-limit: ${TRANSLATION_LIMIT_ANONYMOUS_TPM:-1000}

# Python translate-server 地址（TeamTranslationService 使用）
translate-server:
  host: ${TRANSLATE_SERVER_HOST:llm-engine}
  port: ${TRANSLATE_SERVER_PORT:8000}
  api-key: "${TRANSLATE_SERVICE_API_KEY:}"  # 服务间认证 Key
  verification:
    code:
      validity: 5
      length: 6

# JWT配置
jwt:
  secret: ${JWT_SECRET} # 必须通过环境变量配置，不提供默认值
  expiration: ${JWT_EXPIRATION:2592000000} # 30天（毫秒）= 30 * 24 * 60 * 60 * 1000

# MTranServer 配置
mtran:
  server:
    host: ${MTRAN_HOST:localhost}
    port: ${MTRAN_PORT:8989}
    api-key: ${MTRAN_API_KEY:}
    mock: ${MTRAN_MOCK:false}  # true = 模拟响应（开发/测试），false = 直连真实 MTranServer

# Resilience4j 熔断器配置
resilience4j:
  circuitbreaker:
    instances:
      mtranServer:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        recordExceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientResponseException
      teamTranslation:
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 3
        recordExceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientResponseException
      embedding:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        recordExceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientResponseException

email:

# Embedding 配置（RAG 翻译记忆）
embedding:
  provider: ${EMBEDDING_PROVIDER:openai}  # openai | ollama
  openai:
    api-key: "${EMBEDDING_OPENAI_API_KEY:}"
    base-url: "${EMBEDDING_OPENAI_BASE_URL:https://api.openai.com/v1}"
    model: "${EMBEDDING_OPENAI_MODEL:text-embedding-3-small}"
  ollama:
    base-url: "http://localhost:11434"
    model: "bge-m3"
  rag:
    direct-hit-threshold: 0.85      # 直接命中相似度阈值
    reference-threshold: 0.5        # 提供参考的相似度阈值
    knn-top-k: 5                    # KNN 搜索返回的 top-k 数量
    hnsw-m: 6                       # HNSW 图参数 M
    fallback-mysql-limit: 20        # MySQL 降级查询的最大记录数

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      show-components: always

# Stripe 支付配置（Test 模式）
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:5173/subscription/result}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:5173/subscription/result?canceled=true}
  prices:
    pro:
      monthly-price-id: ${STRIPE_PRO_MONTHLY_PRICE_ID:price_pro_monthly}
      yearly-price-id: ${STRIPE_PRO_YEARLY_PRICE_ID:price_pro_yearly}
    max:
      monthly-price-id: ${STRIPE_MAX_MONTHLY_PRICE_ID:price_max_monthly}
      yearly-price-id: ${STRIPE_MAX_YEARLY_PRICE_ID:price_max_yearly}

